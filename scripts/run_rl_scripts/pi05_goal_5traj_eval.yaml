#   YAML=scripts/run_rl_scripts/pi05_goal_5traj_eval.yaml \
#   MODE=pi05_goal_5traj_eval \
#       bash scripts/run_rl_scripts/run_eval_pi05_latest_zhanghe.sh

modes:
  pi05_goal_5traj_eval:
    type: "eval"
    checkpoint: "./results/training/Pi05-goal-5traj-openpi/checkpoints/steps_30000"
    task_suite: "libero_goal"
    num_trials: 50
    host: "127.0.0.1"
    port: 5796
    gpu_id: 3
