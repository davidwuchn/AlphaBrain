# Eval config for the in-progress pi05_1traj finetune run.
#
# Source: ./results/training/Pi05-1traj-libero_goal/
#   framework: PaliGemmaPi05 (paligemma_pi0 with pi05 head)
#   data: libero_goal, num_traj_per_task=1, 80k steps target, LR 2.5e-5
#
# Launch:
#   bash scripts/run_base_vla/eval.sh pi05_1traj_goal_eval \
#        scripts/run_rl_scripts/pi05_1traj_eval.yaml
#
# Swap `checkpoint` to a later step as training progresses (save_interval=10000):
# checkpoints/steps_{10000,20000,...,80000}, or final_model when finished.

modes:
  pi05_1traj_goal_eval:
    type: "eval"
    checkpoint: "./results/training/Pi05-1traj-libero_goal/checkpoints/steps_10000"
    task_suite: "libero_goal"
    num_trials: 2
    host: "127.0.0.1"
    port: 5795
    gpu_id: 6
    use_bf16: true
