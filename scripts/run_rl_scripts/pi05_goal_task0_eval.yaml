# Eval config for the in-progress pi05_goal_task0 finetune.
#
# Source: ./results/training/Pi05-goal-task0/
#   framework: PaliGemmaPi05 (paligemma_pi0 with pi05 head)
#   data: libero_goal, task_whitelist=["open the middle drawer of the cabinet"],
#         all 43 demos, 150k steps target, LR 5e-5 (v3-mirrored recipe)
#
# Launch:
#   bash scripts/run_base_vla/eval.sh pi05_goal_task0_eval \
#        scripts/run_rl_scripts/pi05_goal_task0_eval.yaml
#
# Swap `checkpoint` to a later step as training progresses (save_interval=2500):
# checkpoints/steps_{2500,5000,7500,...,150000}, or final_model when finished.

modes:
  pi05_goal_task0_eval:
    type: "eval"
    checkpoint: "./results/training/Pi05-goal-task0-openpi/checkpoints/steps_6000"
    task_suite: "libero_goal"
    num_trials: 10
    host: "127.0.0.1"
    port: 5795
    gpu_id: 0
    use_bf16: true
